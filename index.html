<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#d97706"/>
  <title>Programmer’s Picnic — TV</title>
  <meta name="description" content="TV-first ES5-compatible PWA."/>

  <link rel="manifest" href="./manifest.webmanifest"/>
  <link rel="icon" href="./icons/icon-192.png"/>

  <style>
    :root{
      --bg:#fff7e6;
      --panel:rgba(255,255,255,.92);
      --ink:#1f2328;
      --muted:#5b6570;
      --line:rgba(31,35,40,.12);
      --shadow:0 14px 40px rgba(31,35,40,.14);
      --radius:22px;
      --saffron:#d97706;
      --focus:0 0 0 4px rgba(217,119,6,.35);
      --safe:40px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui, Arial;
      background:var(--bg);
      padding:var(--safe);
      color:var(--ink);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:var(--panel);
      padding:18px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }

    .brand{display:flex;align-items:center;gap:14px}

    .logo{
      width:58px;height:58px;
      border-radius:18px;
      display:flex;align-items:center;justify-content:center;
      background:var(--saffron);
      color:#fff;
      font-weight:900;
      font-size:22px;
    }

    h1{margin:20px 0 10px;font-size:34px}

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-top:20px;
    }

    .card{
      background:var(--panel);
      border-radius:24px;
      padding:18px;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      cursor:pointer;
      outline:none;
      min-height:120px;
      text-align:left;
    }

    .card:focus{
      box-shadow:var(--shadow), var(--focus);
      transform:scale(1.03);
    }

    .title{font-weight:900;font-size:18px;margin:6px 0}
    .desc{color:var(--muted);font-size:14px}

    .toast{
      position:fixed;
      left:40px;
      bottom:40px;
      background:#1f2328;
      color:white;
      padding:12px 14px;
      border-radius:16px;
      opacity:0;
      transition:.2s;
    }
    .toast.show{opacity:1}
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">PP</div>
    <div>
      <div style="font-weight:900;">Programmer’s Picnic</div>
      <div style="color:#666;font-size:13px;">Android TV Launcher</div>
    </div>
  </div>
  <div style="font-size:13px;color:#666;">
    D-pad + Enter
  </div>
</div>

<h1>TV Launcher</h1>

<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

function $(id){return document.getElementById(id);}

var apps=[
 {title:"Python Starter Club",desc:"Interactive Python learning.",url:"https://learnwithchampak.live"},
 {title:"Saturday Questions",desc:"Solve coding challenges.",url:"https://programmer-s-picnic.github.io/lesson-viewer/"},
 {title:"JavaScript Champion",desc:"Build JS projects.",url:"https://programmer-s-picnic.github.io/lesson-viewer/saturdayquestion"},
 {title:"Punya Yatra",desc:"Tour planner for TV.",url:"https://punyayatra.in/"},
 {title:"Reload",desc:"Reload this launcher.",action:"reload"}
];

var grid=$("grid");

for(var i=0;i<apps.length;i++){
 (function(index){
  var a=apps[index];
  var b=document.createElement("button");
  b.className="card";
  b.setAttribute("data-index",index);
  b.innerHTML=
    '<div class="title">'+a.title+'</div>'+
    '<div class="desc">'+a.desc+'</div>';
  b.onclick=function(){activate(index);};
  grid.appendChild(b);
 })(i);
}

grid.querySelector(".card").focus();

function activate(i){
 var a=apps[i];
 if(a.action==="reload"){location.reload();return;}
 if(a.url){window.location.href=a.url;}
}

document.addEventListener("keydown",function(e){
 var cards=grid.querySelectorAll(".card");
 var active=document.activeElement;
 var idx=parseInt(active.getAttribute("data-index"),10);
 var cols=4;
 var next=idx;

 if(e.key==="ArrowRight")next=idx+1;
 if(e.key==="ArrowLeft")next=idx-1;
 if(e.key==="ArrowDown")next=idx+cols;
 if(e.key==="ArrowUp")next=idx-cols;

 if(next>=0 && next<cards.length){
  cards[next].focus();
  e.preventDefault();
 }

 if(e.key==="Enter"){active.click();}
});

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("./service-worker.js");
}

})();
</script>

</body>
</html>
